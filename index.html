<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS — Complete Discography</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+KR:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f0ede6;
    --muted: #888;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    padding: 2rem;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, #1a0533 0%, #0a0a0a 70%);
  }
  .hero-noise {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 16vw, 180px);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: #fff;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
  }
  .hero-title span {
    background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    margin-top: 1.5rem;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }
  .hero-scroll {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
  }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, transparent, var(--muted));
    animation: scrollPulse 2s infinite;
  }
  @keyframes scrollPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    overflow-x: auto;
  }
  .nav-inner {
    display: flex;
    gap: 0;
    max-width: 1400px;
    margin: 0 auto;
    white-space: nowrap;
  }
  .nav-era {
    padding: 14px 20px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .nav-era:hover { color: var(--fg); }
  .nav-era.active { color: var(--fg); border-bottom-color: var(--fg); }

  /* ── MAIN ── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 4rem 2rem 8rem;
  }

  /* ── ERA HEADER ── */
  .era-block { margin-bottom: 6rem; }
  .era-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .era-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
  }
  .era-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: 0.05em;
    color: var(--fg);
  }

  /* ── ALBUM CARD ── */
  .album-grid {
    display: grid;
    gap: 2rem;
  }
  .album-card {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #111;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .album-card:hover { transform: translateY(-2px); }
  .album-card-header {
    padding: 2rem 2rem 1.5rem;
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .album-cover {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.3;
  }
  .album-info { flex: 1; min-width: 0; }
  .album-type {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.7;
  }
  .album-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 3vw, 28px);
    letter-spacing: 0.04em;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .album-date {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .album-tagline {
    font-size: 13px;
    color: rgba(240,237,230,0.65);
    line-height: 1.5;
    font-style: italic;
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
  }
  .album-toggle {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 4px;
  }
  .album-toggle:hover { background: rgba(255,255,255,0.06); color: var(--fg); }

  /* ── TRACKLIST ── */
  .tracklist {
    display: none;
    border-top: 1px solid var(--border);
  }
  .tracklist.open { display: block; }
  .mbti-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  .mbti-pill {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .mbti-pill:hover { border-color: rgba(255,255,255,0.2); color: var(--fg); }
  .mbti-pill.active { background: rgba(255,255,255,0.1); color: var(--fg); border-color: rgba(255,255,255,0.3); }
  .track-list { padding: 0.5rem 0; }
  .track-row {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .track-row:last-child { border-bottom: none; }
  .track-row:hover { background: rgba(255,255,255,0.02); }
  .track-row-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 2rem;
    cursor: pointer;
  }
  .track-n { font-size: 11px; color: var(--muted); min-width: 20px; }
  .track-name { flex: 1; font-size: 14px; font-weight: 400; }
  .track-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .t-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .t-mbti { background: rgba(167,139,250,0.15); color: #c4b5fd; border: 1px solid rgba(167,139,250,0.2); }
  .t-theme { border: 1px solid var(--border); color: var(--muted); background: transparent; }
  .track-dur { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .track-chev { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
  .track-chev.open { transform: rotate(180deg); }
  .track-detail {
    display: none;
    padding: 0 2rem 1.25rem 3.5rem;
  }
  .track-detail.open { display: block; }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .detail-section h5 {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .detail-section p { font-size: 13px; color: rgba(240,237,230,0.75); line-height: 1.65; }
  .lyric-quote {
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    font-weight: 300;
    font-style: italic;
    line-height: 1.7;
    color: rgba(240,237,230,0.8);
    border-left: 3px solid;
  }
  .intensity-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .intensity-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .pip { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .pip.on { background: currentColor; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.08em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .detail-grid { grid-template-columns: 1fr; }
    .album-card-header { flex-wrap: wrap; }
    .track-tags { display: none; }
  }
</style>
</head>
<body>

  <div class="hero-bg"></div>

    <h1 class="hero-title">B<span>T</span>S</h1>
    <p class="hero-sub">2013 – Present · Every album · Every EP · Every single · Fully analysed</p>

          { n:2, t:"N.O", d:"3:41", mbti:"ENFJ", theme:"Education critique", meaning:"BTS's breakout single — a fierce critique of Korean education pressure that grinds students into identical machines. Musically indebted to early 2000s hip-hop.", character:"Passionate and rallying, speaking for the many who feel trapped by systems.", lyric:"Who made us this way / Stop, take a breath / N.O, N.O", mood:5 },

    '<div class="nav-era" onclick="scrollToEra(\'hyyh\',this)">HYYH</div>' +

function scrollToEra(id, el) {
  document.querySelectorAll('.nav-era').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  const target = document.getElementById('era-' + id);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function coverStyle(color) {
  return `background: ${color.bg}; border: 1px solid ${color.accent}40; color: ${color.text};`;
}

function pipDots(mood, accent) {
  return Array.from({length:5}, (_,i) =>
    `<div class="pip${i < mood ? ' on' : ''}" style="color:${accent}"></div>`
  ).join('');
}

    mbtiSet.map(m => `<button class="mbti-pill" onclick="filterMbti('${al.id}','${m}',this)">${m}</button>`).join('');

  const tracksHtml = al.tracks.map(t => {
    const themeClass = `t-theme`;
    return `<div class="track-row" data-mbti="${t.mbti}" data-album="${al.id}">
      <div class="track-row-header" onclick="toggleTrack(this)">
        <span class="track-n">${t.n}</span>
        <span class="track-name">${t.t}</span>
        <div class="track-tags">
          <span class="t-tag t-mbti">${t.mbti}</span>
          <span class="t-tag ${themeClass}" style="color:${c.text};border-color:${c.accent}40">${t.theme}</span>
        </div>
        <span class="track-dur">${t.d}</span>
        <span class="track-chev">▾</span>
      </div>
      <div class="track-detail">
        <div class="intensity-row">
          <span class="intensity-label">Intensity</span>
          <div style="display:flex;gap:3px">${pipDots(t.mood, c.accent)}</div>
        </div>
        <div class="detail-grid">
          <div class="detail-section"><h5>Meaning</h5><p>${t.meaning}</p></div>
          <div class="detail-section"><h5>MBTI lens</h5><p>${t.character}</p></div>
        </div>
        <div class="lyric-quote" style="background:${c.bg};border-left-color:${c.accent}">${t.lyric}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="album-card" id="album-${al.id}" style="border-color:${c.accent}20">
    <div class="album-card-header" style="background:${c.bg}10" onclick="toggleAlbum('${al.id}')">
      <div class="album-cover" style="${coverStyle(c)}">${al.title.split(':').join('\n')}</div>
      <div class="album-info">
        <div class="album-type" style="color:${c.accent}">${al.type}</div>
        <div class="album-title">${al.title}</div>
        <div class="album-date">${al.date} · ${al.tracks.length} tracks</div>
        <div class="album-tagline">${al.tagline}</div>
      </div>
      <button class="album-toggle" style="border-color:${c.accent}40;color:${c.accent}" onclick="event.stopPropagation();toggleAlbum('${al.id}')">Show tracks ▾</button>
    </div>
    <div class="tracklist" id="tl-${al.id}">
      <div class="mbti-bar">${pillsHtml}</div>
      <div class="track-list">${tracksHtml}</div>
    </div>
  </div>`;
}

function buildPage() {
  const main = document.getElementById('main-content');
  main.innerHTML = DISCOGRAPHY.map(era => `
    <div class="era-block" id="era-${era.eraId}">
      <div class="era-header">
        <span class="era-label">Era</span>
        <h2 class="era-name">${era.era}</h2>
      </div>
      <div class="album-grid">${era.albums.map(buildAlbum).join('')}</div>
    </div>
  `).join('');
}

function toggleAlbum(id) {
  const tl = document.getElementById('tl-' + id);
  const btn = document.querySelector(`#album-${id} .album-toggle`);
  tl.classList.toggle('open');
  if (btn) btn.textContent = tl.classList.contains('open') ? 'Hide tracks ▴' : 'Show tracks ▾';
}

function toggleTrack(header) {
  const detail = header.nextElementSibling;
  const chev = header.querySelector('.track-chev');
  detail.classList.toggle('open');
  chev.classList.toggle('open');
}

function filterMbti(albumId, mbti, btn) {
  const tl = document.getElementById('tl-' + albumId);
  tl.querySelectorAll('.mbti-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  tl.querySelectorAll('.track-row').forEach(row => {
    row.style.display = (mbti === 'all' || row.dataset.mbti === mbti) ? 'block' : 'none';
  });
}

// Scroll spy
function setupScrollSpy() {
  const eras = DISCOGRAPHY.map(e => ({ id: e.eraId, el: document.getElementById('era-' + e.eraId) }));
  const navItems = document.querySelectorAll('.nav-era');
  window.addEventListener('scroll', () => {
    let current = eras[0].id;
    eras.forEach(e => { if (e.el && window.scrollY >= e.el.offsetTop - 100) current = e.id; });
    navItems.forEach((n, i) => {
      n.classList.toggle('active', DISCOGRAPHY[i].eraId === current);
    });
  });
}

buildNav();
buildPage();
setupScrollSpy();
</script>
</body>
</html>
