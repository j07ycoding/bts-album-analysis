<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS — Complete Discography</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+KR:wght@300;400;600&family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --bg:#080808; --fg:#f2ede8; --muted:#666; --border:rgba(255,255,255,0.07); --card:#0e0e0e; }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--fg); font-family:'Syne',sans-serif; font-size:14px; line-height:1.6; overflow-x:hidden; }

  /* HERO */
  .hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; overflow:hidden; padding:2rem; }
  .hero-bg { position:absolute; inset:0; background:radial-gradient(ellipse 120% 70% at 20% 80%,#1a0a2e 0%,transparent 55%),radial-gradient(ellipse 80% 60% at 80% 20%,#0a1a2e 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 50% 50%,#130a1f 0%,#080808 70%); }
  .hero-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px); background-size:60px 60px; mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 80%); }
  .hero-content { position:relative; z-index:1; }
  .hero-eyebrow { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--muted); margin-bottom:2rem; opacity:0; animation:fadeUp 0.9s 0.2s cubic-bezier(.22,1,.36,1) forwards; }
  .hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(100px,20vw,220px); letter-spacing:0.06em; line-height:0.85; color:#fff; opacity:0; animation:fadeUp 0.9s 0.35s cubic-bezier(.22,1,.36,1) forwards; }
  .hero-title .accent { background:linear-gradient(135deg,#7c3aed 0%,#ec4899 50%,#f97316 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .hero-meta { margin-top:2rem; display:flex; justify-content:center; gap:3rem; opacity:0; animation:fadeUp 0.9s 0.5s cubic-bezier(.22,1,.36,1) forwards; }
  .hero-meta-item { text-align:center; }
  .hero-meta-num { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:0.04em; color:#fff; line-height:1; }
  .hero-meta-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
  .hero-scroll { position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:10px; opacity:0; animation:fadeUp 0.9s 0.9s forwards; }
  .scroll-track { width:1px; height:50px; background:var(--border); position:relative; overflow:hidden; }
  .scroll-thumb { position:absolute; top:-100%; width:100%; height:50%; background:linear-gradient(to bottom,transparent,var(--muted)); animation:scrollDrop 2.2s ease-in-out infinite; }
  .scroll-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); }
  @keyframes scrollDrop { 0%{top:-100%} 100%{top:200%} }

  /* NAV */
  nav { position:sticky; top:0; z-index:100; background:rgba(8,8,8,0.92); backdrop-filter:blur(16px) saturate(1.5); border-bottom:1px solid var(--border); }
  .nav-inner { display:flex; max-width:1400px; margin:0 auto; padding:0 2rem; overflow-x:auto; white-space:nowrap; scrollbar-width:none; }
  .nav-inner::-webkit-scrollbar { display:none; }
  .nav-era { padding:15px 20px; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); cursor:pointer; border-bottom:1px solid transparent; transition:all 0.2s; flex-shrink:0; }
  .nav-era:hover { color:rgba(255,255,255,0.6); }
  .nav-era.active { color:var(--fg); border-bottom-color:var(--fg); }

  /* LAYOUT */
  main { max-width:1400px; margin:0 auto; padding:5rem 2rem 10rem; }
  .era-block { margin-bottom:7rem; }
  .era-header { display:flex; align-items:baseline; gap:1.2rem; margin-bottom:3rem; padding-bottom:1.2rem; border-bottom:1px solid var(--border); position:relative; }
  .era-header::before { content:''; position:absolute; bottom:-1px; left:0; width:60px; height:1px; background:var(--era-accent,#7c3aed); }
  .era-num { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; color:var(--muted); }
  .era-name { font-family:'Bebas Neue',sans-serif; font-size:clamp(30px,4.5vw,48px); letter-spacing:0.04em; color:var(--fg); }
  .era-years { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.15em; color:var(--muted); margin-left:auto; }
  .album-grid { display:grid; gap:1.5rem; }

  /* ALBUM CARD */
  .album-card { border-radius:12px; overflow:hidden; border:1px solid var(--border); background:var(--card); transition:border-color 0.3s; }
  .album-card:hover { border-color:rgba(255,255,255,0.12); }
  .album-card-header { padding:1.75rem 2rem; display:flex; align-items:flex-start; gap:1.5rem; cursor:pointer; position:relative; overflow:hidden; }
  .album-card-header::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 60% 100% at 0% 50%,var(--al-bg,transparent) 0%,transparent 70%); pointer-events:none; opacity:0.4; }
  .album-cover { width:72px; height:72px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:9px; letter-spacing:0.1em; text-align:center; line-height:1.4; padding:6px; }
  .album-info { flex:1; min-width:0; }
  .album-type { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:5px; }
  .album-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(18px,2.5vw,26px); letter-spacing:0.05em; line-height:1.1; margin-bottom:5px; }
  .album-date { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:8px; }
  .album-tagline { font-family:'Noto Serif KR',serif; font-size:12px; color:rgba(242,237,232,0.5); line-height:1.6; font-style:italic; font-weight:300; }
  .album-toggle { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.15em; text-transform:uppercase; padding:7px 14px; border-radius:999px; border:1px solid; background:transparent; cursor:pointer; transition:all 0.2s; white-space:nowrap; align-self:flex-start; margin-top:2px; flex-shrink:0; }
  .album-toggle:hover { background:rgba(255,255,255,0.05); }

  /* TRACKLIST */
  .tracklist { display:none; border-top:1px solid var(--border); }
  .tracklist.open { display:block; }
  .filter-bar { display:flex; flex-wrap:wrap; gap:5px; align-items:center; padding:1rem 2rem; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.3); }
  .filter-label { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-right:6px; }
  .mbti-pill { font-family:'DM Mono',monospace; font-size:9px; padding:3px 10px; border-radius:999px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.15s; letter-spacing:0.04em; }
  .mbti-pill:hover { border-color:rgba(255,255,255,0.2); color:var(--fg); }
  .mbti-pill.active { background:rgba(255,255,255,0.08); color:var(--fg); border-color:rgba(255,255,255,0.25); }

  /* TRACK ROWS */
  .track-list { padding:0; }
  .track-row { border-bottom:1px solid var(--border); }
  .track-row:last-child { border-bottom:none; }
  .track-row.hidden { display:none; }
  .track-row-header { display:flex; align-items:center; gap:14px; padding:11px 2rem; cursor:pointer; transition:background 0.15s; }
  .track-row-header:hover { background:rgba(255,255,255,0.025); }
  .track-n { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); min-width:18px; text-align:right; }
  .track-name { flex:1; font-size:13px; font-weight:700; letter-spacing:0.01em; }
  .track-tags { display:flex; gap:5px; flex-wrap:wrap; }
  .t-tag { font-family:'DM Mono',monospace; font-size:9px; padding:2px 8px; border-radius:4px; font-weight:400; letter-spacing:0.04em; white-space:nowrap; }
  .t-mbti { background:rgba(124,58,237,0.15); color:#a78bfa; border:1px solid rgba(124,58,237,0.25); }
  .t-theme { border:1px solid var(--border); color:var(--muted); background:transparent; }
  .track-dur { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); white-space:nowrap; }
  .track-chev { font-size:10px; color:var(--muted); transition:transform 0.25s; flex-shrink:0; }
  .track-chev.open { transform:rotate(180deg); }

  /* TRACK DETAIL */
  .track-detail { display:none; padding:0 2rem 1.5rem 3.2rem; }
  .track-detail.open { display:block; }
  .intensity-bar { display:flex; align-items:center; gap:8px; margin-bottom:1rem; }
  .intensity-label { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
  .pip { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.08); }
  .pip.on { background:currentColor; }

  .themes-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:1rem; }
  .theme-chip { font-family:'DM Mono',monospace; font-size:9px; padding:3px 10px; border-radius:4px; letter-spacing:0.04em; }

  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin-bottom:1rem; }
  .detail-section h5 { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .detail-section p { font-size:12px; color:rgba(242,237,232,0.65); line-height:1.7; }

  .universe-block { margin-bottom:1rem; padding:10px 14px; border-radius:6px; background:rgba(255,255,255,0.025); border:1px solid var(--border); }
  .universe-block h5 { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .universe-block p { font-size:12px; color:rgba(242,237,232,0.6); line-height:1.65; }

  .lyric-quote { padding:12px 16px; border-radius:6px; font-family:'Noto Serif KR',serif; font-size:12px; font-weight:300; font-style:italic; line-height:1.8; color:rgba(242,237,232,0.7); border-left:2px solid; }

  footer { text-align:center; padding:3rem 2rem; border-top:1px solid var(--border); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.15em; color:var(--muted); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  @media(max-width:640px) { .detail-grid{grid-template-columns:1fr} .album-card-header{flex-wrap:wrap} .track-tags{display:none} .hero-meta{gap:1.5rem} }
</style>
</head>

<script>
// Each track: n, t (title), d (duration), mbti, themes (array), meaning, universe, lyric, mood (1-5)
const DISCOGRAPHY = [
  {
    era:"School Trilogy", eraId:"school", years:"2013 – 2014", accent:"#4ade80",
    albums:[
      {
        id:"skool1", type:"Single Album", title:"2 COOL 4 SKOOL", date:"Jun 12, 2013",
        tagline:"The very beginning — BTS's debut single album, raw with hip-hop hunger and teenage defiance.",
        color:{bg:"#0d1f0d",accent:"#4ade80",text:"#bbf7d0"},
        tracks:[
          {n:1,t:"Intro: 2 COOL 4 SKOOL (feat. DJ Friz)",d:"1:02",mbti:"ENTP",themes:["debut","provocation","identity"],meaning:"A spoken-word intro establishing BTS as something new — self-aware, combative, unafraid. The first thing the world ever heard from them.",universe:"Opens the School Trilogy's central conflict: BTS vs. a society that has already decided who they should be. The bulletproof mythology is seeded here.",lyric:"We're too cool for school / Too cool to follow rules / Watch how we do this",mood:4},
          {n:2,t:"We Are Bulletproof Pt.1",d:"3:17",mbti:"ISTP",themes:["defiance","arrival","proof"],meaning:"The debut proper — a declaration that nothing can stop them. Harder and rawer than Pt.2, with more to prove and less track record to back it up.",universe:"Part one of a decade-long thread: Pt.2 on O!RUL8,2?, then 'We Are Bulletproof: the Eternal' on Map of the Soul: 7 — resilience as identity across ten years.",lyric:"We are bulletproof / Nothing stops us / We came for this",mood:5},
          {n:3,t:"Skit: Circle Room Talk",d:"2:46",mbti:"ESFJ",themes:["unscripted","vulnerability","pre-debut"],meaning:"Seven teenagers hours before debut — genuine, unguarded anxiety and excitement in a way they'd rarely be again. The first of BTS's iconic skit tracks.",universe:"Documents the exact moment before everything changed. Later skits (HYYH, Wings, Love Yourself) chart how their relationship with fame evolves.",lyric:"[Unscripted] I'm nervous... but I'm ready. Are you ready?",mood:2},
          {n:4,t:"No More Dream",d:"3:46",mbti:"ENFJ",themes:["Korean society","education critique","dreams"],meaning:"The debut single — a challenge to Korean youth paralysed by society's script. Not a rejection of dreams, but a demand to find your own rather than borrowing someone else's.",universe:"The School Trilogy's thesis statement. Its critique of institutional conformity echoes forward into 'N.O', 'Silver Spoon (Baepsae)', and 'UGH!' as BTS's social commentary matures.",lyric:"What's your dream / Don't live someone else's / What do YOU want?",mood:5},
          {n:5,t:"Interlude",d:"1:06",mbti:"ISFP",themes:["instrumental","transition","breath"],meaning:"A short instrumental pause — the deliberate exhale between two high-energy declarations.",universe:"BTS's recurring use of silence and interlude as structural breath — present across every era, from Whalien 52 to No. 29 on ARIRANG.",lyric:"[Instrumental]",mood:2},
          {n:6,t:"I Like It (좋아요)",d:"3:43",mbti:"ENFP",themes:["first love","innocence","lightness"],meaning:"A refreshingly lightweight track — the joy of simply liking someone. After the manifesto energy, a reminder that BTS are also just teenagers.",universe:"Represents the softer register sitting alongside the trilogy's anger — same tension between rebellion and tenderness found in 'Just One Day', 'Coffee', and 'Converse High'.",lyric:"I like it, I like you / It's simple / Do I need more reason?",mood:4},
          {n:7,t:"Outro: Circle Room Cypher",d:"2:49",mbti:"ENTP",themes:["rap line","hunger","individual voice"],meaning:"RM, Suga, and j-hope's first proper cypher — three distinct voices establishing the chemistry that would define BTS. Raw, fast, and hungry.",universe:"Cypher Pt.1 of 4. Each instalment (O!RUL8,2?, Skool Luv Affair, Dark & Wild, Wings) marks a measurable leap in technical skill and emotional depth.",lyric:"Three mics / One room / Let's see what we can do",mood:5}
        ]
      },
      {
        id:"ool2013", type:"EP", title:"O!RUL8,2?", date:"Sep 11, 2013",
        tagline:"A letter to youth: are you too late? BTS's debut mini-album channels raw teenage frustration into hip-hop rebellion.",
        color:{bg:"#1a2a1a",accent:"#4ade80",text:"#bbf7d0"},
        tracks:[
          {n:1,t:"Intro: O!RUL8,2?",d:"1:39",mbti:"ENTP",themes:["time","social pressure","defiance"],meaning:"RM's spoken-word challenge to society's timetables for success. Are you too late? It's your life — not theirs.",universe:"Deepens the School Trilogy's interrogation of social timelines. The same anxiety about 'being on track' resurfaces in 'Tomorrow' and later in 'My Time' on Map of the Soul: 7.",lyric:"Are you too late? / No, you're right on time / It's your life, not theirs",mood:4},
          {n:2,t:"N.O",d:"3:41",mbti:"ENFJ",themes:["education system","collective anger","Korean society"],meaning:"A fierce critique of Korean education pressure that grinds students into identical machines. Musically indebted to early 2000s hip-hop.",universe:"The School Trilogy's most direct social critique. The anger at institutional conformity is picked up years later in 'Silver Spoon (Baepsae)' and 'UGH!'.",lyric:"Who made us this way / Stop, take a breath / N.O, N.O",mood:5},
          {n:3,t:"We Are Bulletproof Pt.2",d:"3:38",mbti:"ISTP",themes:["defiance","proving doubters wrong","resilience"],meaning:"A direct address to critics who dismissed BTS before debut. Hard-edged and defiant, cementing the bulletproof identity.",universe:"The middle chapter of the bulletproof thread — Pt.1 (2 Cool 4 Skool) → Pt.2 here → 'We Are Bulletproof: the Eternal' (Map of the Soul: 7). A decade of the same declaration.",lyric:"We are bulletproof / Can't stop us now / We've made it this far",mood:5},
          {n:4,t:"Skit: R U Happy?",d:"2:03",mbti:"ESFJ",themes:["happiness","unscripted","self-questioning"],meaning:"Unscripted conversation about what happiness means at their age — candid, unresolved, and genuinely uncertain.",universe:"The question of true happiness threads through Wings' solo tracks ('Reflection', 'Awake'), BE's 'Blue & Grey', and resurfaces in ARIRANG's 'NORMAL'.",lyric:"[Unscripted] Are we happy right now? / I think so... maybe",mood:2},
          {n:5,t:"If I Ruled the World",d:"3:49",mbti:"ENFP",themes:["idealism","dreaming big","altruism"],meaning:"A playful but sincere fantasy about using unlimited power for good. Jangly, melodic, and full of teenage idealism.",universe:"The idealistic counterpart to 'No More Dream' — same era, different register. The impulse to fix the world reappears in 'Anpanman' and 'Yet to Come'.",lyric:"If I ruled the world / There'd be no more tears / Just dreams and stars",mood:3},
          {n:6,t:"Coffee",d:"3:33",mbti:"ISFP",themes:["bittersweet longing","sensory metaphor","vocal line"],meaning:"A gentle metaphor comparing a lover to coffee — comforting but always leaving you wanting more. One of the vocal line's earliest showcase moments.",universe:"BTS's first sustained use of everyday objects as emotional stand-ins — a technique that deepens in 'Converse High', 'Spring Day', and 'Black Swan'.",lyric:"You're like coffee / Bitter and sweet / I keep coming back for more",mood:2},
          {n:7,t:"BTS Cypher Pt.1",d:"3:47",mbti:"ENTP",themes:["rap line","lyrical competition","identity"],meaning:"The first Cypher — RM, Suga, and j-hope establishing individual voices and competitive chemistry. Raw, fast, hungry.",universe:"Cypher Pt.1 of 4. Each instalment marks the rap line's growth — Pt.1 is the arrival, Pt.4 (Wings) is the vindication.",lyric:"I came from the bottom / Now I'm climbing / No ceiling can hold me",mood:5},
          {n:8,t:"Attack on Bangtan",d:"3:37",mbti:"ISTP",themes:["self-mythology","anime influence","energy"],meaning:"An anime-influenced battle bop — BTS as warriors storming impossible odds. Energetic, silly, unabashedly fun.",universe:"An early, playful version of the warrior imagery that becomes more serious in 'ON' and 'Not Today'. BTS mythologising themselves across eras.",lyric:"Attack on Bangtan / We're bulletproof / Nothing can stop us",mood:5},
          {n:9,t:"Paldogangsan (팔도강산)",d:"3:54",mbti:"ESFJ",themes:["regional identity","unity","Korean culture"],meaning:"Each member raps in their hometown dialect — a celebration of Korean regional diversity that doubles as a group bonding exercise.",universe:"BTS grounding their identity in Korean culture early — a thread that runs through 'Ma City', 'Idol' (pansori elements), and the title ARIRANG itself.",lyric:"From every corner of Korea / We came together / This is who we are",mood:4},
          {n:10,t:"Outro: Luv in Skool",d:"3:41",mbti:"ENFP",themes:["school crush","innocence","sweetness"],meaning:"A sweet closer about school-day crushes. Pulls back all the aggression of the album for one moment of pure, unguarded softness.",universe:"Closes the School Trilogy's first chapter on a note of innocence — the same tenderness that reappears in 'Just One Day' and 'Converse High'.",lyric:"I see you in the hallway / My heart beats faster / Is this what love is?",mood:2}
        ]
      },
      {
        id:"skool2", type:"EP", title:"SKOOL LUV AFFAIR", date:"Feb 12, 2014",
        tagline:"First love examined with urgency — the trilogy's emotional peak before adulthood arrives.",
        color:{bg:"#1a1a2e",accent:"#818cf8",text:"#c7d2fe"},
        tracks:[
          {n:1,t:"Intro: Skool Luv Affair",d:"1:22",mbti:"ENFP",themes:["love's arrival","vulnerability","transition"],meaning:"A brief orchestral intro signalling a tonal shift — from rebellion to vulnerability. Love has arrived and BTS doesn't quite know what to do with it.",universe:"Marks the School Trilogy's pivot from social critique toward emotional interiority — a shift that deepens through HYYH and the Love Yourself series.",lyric:"Love has found me / I wasn't ready / But here it is",mood:2},
          {n:2,t:"Boy In Luv (상남자)",d:"3:49",mbti:"ENFJ",themes:["desperate first love","intensity","longing"],meaning:"Intense, almost aggressive devotion that borders on frustration. A raw portrait of loving someone who doesn't notice you.",universe:"Represents the unrefined emotional volatility of the School era — compare to the more measured longing of 'Just One Day' on the same album, or the mature self-love of 'Idol' later.",lyric:"I want to be your oppa / But you just pass me by / Notice me",mood:5},
          {n:3,t:"Skit: Soulmate",d:"2:13",mbti:"ESFJ",themes:["friendship","unscripted","belonging"],meaning:"An unscripted interlude exploring whether the deepest love is found in friendship — a recurring BTS theme.",universe:"Plants the seed for BTS's later meditations on brotherhood: 'Friends' (Map of the Soul: 7), 'We Are Bulletproof: the Eternal', and the group dynamics explored in Wings' solo tracks.",lyric:"[Unscripted] The people who know us best... aren't they our real soulmates?",mood:2},
          {n:4,t:"Where You From (어디에서 왔는지)",d:"3:38",mbti:"ENTP",themes:["curiosity","attraction","playfulness"],meaning:"A playful retro track about falling for someone whose origins are a mystery. Lighter and more comedic than the album's emotional centrepieces.",universe:"Tonally light, but its curiosity about 'origin' mirrors the deeper identity questions BTS ask throughout their discography — who are we, and where did we come from?",lyric:"Where are you from / What made you this way / I want to know everything",mood:3},
          {n:5,t:"Just One Day (하루만)",d:"3:51",mbti:"INFP",themes:["modest longing","restraint","imagination"],meaning:"Perhaps the purest love song in early BTS — a wish for just one day with someone, nothing more. Soft, melodic, heartbreakingly restrained.",universe:"The emotional opposite of 'Boy In Luv' — same album, same feeling, entirely different register. Shows BTS's range even at this early stage.",lyric:"Just one day / One day with you / That would be enough for me",mood:1},
          {n:6,t:"Tomorrow",d:"4:12",mbti:"INTJ",themes:["fear of the future","uncertainty","survival"],meaning:"A sleeper-hit fan anthem — honestly addressing the terror of growing up without a clear path. More thematically mature than the album's surface suggests.",universe:"Directly anticipates the HYYH era's themes of youth's fragility. 'Tomorrow' is the School Trilogy asking what comes next — HYYH is the answer.",lyric:"Even if today is cruel / Tomorrow will come / Just hold on",mood:3},
          {n:7,t:"BTS Cypher Pt.2: Triptych",d:"4:34",mbti:"ENTP",themes:["individual identity","rap line","self-definition"],meaning:"Each rapper defines themselves: Suga's bleakness, j-hope's brightness, RM's leadership. The most personally revealing Cypher.",universe:"The Cypher series' emotional peak in terms of self-disclosure. Sets up the individual confessions of Wings' solo tracks — Begin, Lie, Stigma, First Love, Reflection, MAMA, Awake.",lyric:"I am who I am / Not what you made me / This is Cypher Pt.2",mood:5},
          {n:8,t:"Spine Breaker (등골브레이커)",d:"3:34",mbti:"ENFJ",themes:["consumerism","Korean society","class"],meaning:"Parents breaking their backs to buy expensive jackets for status-hungry teens. Funny, pointed, and deeply Korean in context.",universe:"An early entry in BTS's running commentary on Korean economics — followed by 'Silver Spoon (Baepsae)' and 'Go Go', each one sharper than the last.",lyric:"Your parents' spine breaks / To buy that jacket / Is it worth it?",mood:4},
          {n:9,t:"Jump",d:"3:35",mbti:"ISTP",themes:["physical release","joy","concerts"],meaning:"The most carefree track BTS ever made — an instruction to jump and forget everything else. Built for concerts, not analysis.",universe:"A rare moment of pure, unanalysed joy — the emotional release valve that reappears in 'Fire', 'Go Go', and 'Dynamite'.",lyric:"Jump / Jump / Jump / Forget everything and just jump",mood:5}
        ]
      },
      {
        id:"darkwild", type:"Studio Album", title:"DARK & WILD", date:"Aug 20, 2014",
        tagline:"The wild side of love — BTS's debut full-length explores passion, pain, and the chaos between them.",
        color:{bg:"#1f0a0a",accent:"#f87171",text:"#fecaca"},
        tracks:[
          {n:1,t:"Intro: What Am I To You",d:"2:36",mbti:"INFP",themes:["uncertainty","one-sided love","vulnerability"],meaning:"RM's vulnerable intro asks the raw question underlying all of Dark & Wild — is this love mutual, or one-sided projection?",universe:"Sets up the album's central tension. This same uncertainty — love given without knowing if it's received — returns in 'Fake Love' and 'The Truth Untold' in the Love Yourself era.",lyric:"What am I to you / Just a passing phase / Or something more",mood:2},
          {n:2,t:"Danger",d:"3:57",mbti:"ENFJ",themes:["love as threat","urgency","anxiety"],meaning:"The lead single — love recast as something genuinely dangerous. Urgent, anxious, melodically explosive.",universe:"Love as danger is a thread running from here through 'Blood Sweat & Tears' (Wings), 'Fake Love' (Tear), and 'Singularity' — each time more self-aware.",lyric:"You're a danger to me / But I can't stay away / Come closer",mood:5},
          {n:3,t:"War of Hormone (호르몬 전쟁)",d:"3:37",mbti:"ISTP",themes:["immaturity","growth","historical context"],meaning:"An immature track BTS have since expressed discomfort with — its inclusion here is important as a marker of artistic growth, not a highlight.",universe:"Significant as a document of where BTS began. Their willingness to publicly reckon with earlier work is part of what makes their journey legible.",lyric:"This war of hormones / I can't control it / You're driving me crazy",mood:5},
          {n:4,t:"Hip Hop Lover",d:"3:35",mbti:"ENTP",themes:["hip-hop identity","artistic devotion","roots"],meaning:"A love letter to hip-hop before any human relationship — declaring that the genre formed them. Deeply sincere beneath the swagger.",universe:"Hip-hop as BTS's first identity before fame complicated everything. Echoes forward into 'Born Singer' on Proof, where the devotion is examined with a decade's worth of hindsight.",lyric:"Hip hop was my first love / Before anyone else / It made me who I am",mood:4},
          {n:5,t:"Let Me Know",d:"4:06",mbti:"INFP",themes:["asking for truth","ambiguity","emotional rawness"],meaning:"One of the most emotionally raw vocal line performances in early BTS. A plea for honesty over comfortable silence — just tell me if it's over.",universe:"Sits alongside 'Rain' and 'Whalien 52' as early vocal line confessions that anticipate the deeper solo explorations of Wings.",lyric:"Let me know if it's over / Don't leave me guessing / I can handle the truth",mood:2},
          {n:6,t:"Rain",d:"3:47",mbti:"ISFP",themes:["melancholy","solitude","Suga's autobiography"],meaning:"Rain as a metaphor for loneliness. Suga wrote it to process his own isolation — one of his earliest emotional confessions.",universe:"A direct precursor to Suga's Agust D trilogy. The solitude here evolves into 'Polar Night' and 'Amygdala' on D-DAY — same voice, deepening honesty.",lyric:"The rain reminds me of you / Both fall without warning / Both leave me cold",mood:1},
          {n:7,t:"BTS Cypher Pt.3: Killer (feat. Supreme Boi)",d:"4:28",mbti:"ENTP",themes:["lyrical dominance","rap craft","vindication"],meaning:"Widely considered the best Cypher — each rapper at their sharpest. A benchmark for Korean hip-hop.",universe:"Cypher Pt.3 of 4. The technical leap from Pt.1 is dramatic. Pt.4 (Wings) completes the arc — from hunger to mastery.",lyric:"I came, I saw, I conquered / Words are my weapon / Cypher Pt.3: Killer",mood:5},
          {n:8,t:"Interlude: Whalien 52",d:"3:56",mbti:"INFP",themes:["loneliness","uniqueness","isolation"],meaning:"Based on the real 52-Hz whale whose frequency no other whale can hear. A metaphor for profound loneliness despite being surrounded by people.",universe:"Gets a full version on HYYH Pt.2 — the loneliness theme deepens across the eras. Resonates with 'Reflection' (Wings), 'Blue & Grey' (BE), and 'NORMAL' (ARIRANG).",lyric:"I'm the 52 Hz whale / Calling out / But no one hears my frequency",mood:1},
          {n:9,t:"The Rise of Bangtan (진격의 방탄)",d:"3:32",mbti:"ISTP",themes:["origin","triumph","arrival"],meaning:"A triumphant recap of how far they've come — energetic and purposeful, contrasting the vulnerability elsewhere on the album.",universe:"A moment of celebration mid-journey. Echoes back to 'We Are Bulletproof' and forward to 'Yet to Come' — BTS periodically pausing to mark the distance covered.",lyric:"We rose from nothing / Now here we stand / This is just the beginning",mood:5},
          {n:10,t:"Hormone War (Alternative ver.)",d:"3:37",mbti:"ENFP",themes:["playfulness","attraction","self-awareness"],meaning:"A more playful, self-aware take on attraction — messy, funny, and deliberately lighter than the original.",universe:"Shows BTS's capacity for self-parody even at this early stage — a quality that later surfaces in 'Spine Breaker', 'Go Go', and 'UGH!'.",lyric:"This is war / Every look you give me / Sends my hormones into battle",mood:4},
          {n:11,t:"Look Here",d:"3:40",mbti:"ENFJ",themes:["attention","R&B","vocal line"],meaning:"Smooth R&B asking a lover to finally look at what's been right in front of them. The vocal line at their most polished so far.",universe:"Part of the Love Trilogy's emotional arc. The plea to 'look here' prefigures the more sophisticated love declarations of the Love Yourself era.",lyric:"Look here / I've been waiting / All you have to do is see me",mood:3},
          {n:12,t:"2nd Grade (2학년)",d:"3:44",mbti:"ENTP",themes:["growth","ambition","self-reflection"],meaning:"A reflection on their second year — proud and restless, caught between emerging and arriving.",universe:"BTS marking their own milestones in real time — compare to 'We Are Bulletproof: the Eternal' (7 years) and 'Yet to Come' (9 years). The practice of self-commemoration.",lyric:"We're in second grade now / We know more / We want more",mood:4},
          {n:13,t:"Outro: Does That Make Sense?",d:"3:49",mbti:"INFP",themes:["questioning","philosophy","RM's interiority"],meaning:"RM closes the album asking if any of this — love, fame, youth — actually makes sense.",universe:"The question RM keeps returning to: does any of this mean what we think it means? Connects to 'Reflection' (Wings), 'Persona' (Map of the Soul), and 'NORMAL' (ARIRANG).",lyric:"Does this make sense? / Does love make sense? / Does any of it?",mood:2}
        ]
      }
    ]

  {
    era:"HYYH (花樣年華)", eraId:"hyyh", years:"2015 – 2016", accent:"#38bdf8",
    albums:[
      {
        id:"hyyh1", type:"EP", title:"THE MOST BEAUTIFUL MOMENT IN LIFE PT.1", date:"Apr 29, 2015",
        tagline:"Youth frozen in amber — the first chapter of BTS's most beloved story cycle.",
        color:{bg:"#0a1a2a",accent:"#38bdf8",text:"#bae6fd"},
        tracks:[
          {n:1,t:"Intro: The Most Beautiful Moment in Life",d:"0:51",mbti:"ISFP",themes:["ephemerality","beauty","youth"],meaning:"A brief orchestral intro establishing the HYYH world — beauty and ephemerality intertwined before a single word is spoken.",universe:"The threshold into BTS's most narratively complex era. The HYYH cinematic universe (The Notes, short films) branches out from this moment.",lyric:"The most beautiful moment / Is the one that's passing",mood:1},
          {n:2,t:"I Need U",d:"3:40",mbti:"INFP",themes:["desperate love","fracture","the HYYH universe"],meaning:"The breakthrough single that introduced the HYYH cinematic universe. Musically delicate, emotionally devastating — each member represents a different kind of fracture.",universe:"The narrative anchor of the HYYH universe. The seven HYYH short films, The Notes novels, and BU (BTS Universe) all branch from this song's imagery of broken youth.",lyric:"I need you / I need you so badly / Without you I'm nothing",mood:3},
          {n:3,t:"Hold Me Tight (잡아줘)",d:"3:44",mbti:"ENFJ",themes:["fear of loss","clinging","vocal line"],meaning:"A sweet, almost desperate melody asking a lover to stay. The vocal line's harmonies are some of the most beautiful in early BTS.",universe:"The emotional inverse of 'Run' — where Run chooses reckless motion, 'Hold Me Tight' is the instinct to stay still and grip what matters.",lyric:"Hold me tight / Before I disappear / Don't let go",mood:2},
          {n:4,t:"Skit: Expectation!",d:"3:12",mbti:"ESFJ",themes:["fan expectations","identity","unscripted"],meaning:"The members discuss the gap between who they are and who fans expect — a candid moment of self-awareness at a pivotal career juncture.",universe:"Directly precedes the Love Yourself era's more explicit exploration of constructed identity — Singularity, Fake Love, and the Persona intro all ask the same question more deeply.",lyric:"[Unscripted] Do we live up to what they see in us?",mood:2},
          {n:5,t:"Dope (쩔어)",d:"3:36",mbti:"ISTP",themes:["hard work","sacrifice","swagger"],meaning:"Contrasting BTS's gruelling schedule with peers who partied — every hour of sacrifice made into swagger. One of their most beloved tracks.",universe:"The pride of the School Trilogy paying off — 'Dope' is BTS arriving. The same energy fuels 'MIC Drop', 'Cypher Pt.4', and 'Run BTS' on Proof.",lyric:"I've been working hard / While you were playing / Now watch me shine",mood:5},
          {n:6,t:"Boyz with Fun (흥탄소년단)",d:"3:34",mbti:"ENFP",themes:["camaraderie","joy","group energy"],meaning:"Pure energy and camaraderie — seven friends who genuinely enjoy each other. One of BTS's most joyful recordings.",universe:"One of the few tracks in the HYYH era that exists outside the darker narrative — a necessary counterweight to 'I Need U', 'Run', and 'Butterfly'.",lyric:"We're the boys with fun / Come join us / Life is better this way",mood:5},
          {n:7,t:"Converse High",d:"3:12",mbti:"ESFJ",themes:["small details","affection","specificity"],meaning:"Falling for someone who wears Converse — a love song about noticing the particular. Remarkably human in its modesty.",universe:"BTS's 'small love' tradition: the specific over the grand. Directly connects to 'Boy With Luv' (Map of the Soul: Persona) — 'I want to know your small things.'",lyric:"Your Converse highs / The way you tie them / I notice everything",mood:3},
          {n:8,t:"Moving On (이사)",d:"3:59",mbti:"INTJ",themes:["leaving","nostalgia","shared beginnings"],meaning:"About moving out of the dorm they grew up in — literally and emotionally. A farewell to shared poverty, shared dreams, shared beginning.",universe:"The dorm was where BTS began. This track is the first look back — a habit that intensifies in 'We Are Bulletproof: the Eternal', 'Proof', and 'For Youth'.",lyric:"We're moving on / Leaving this place behind / But it stays inside us",mood:2},
          {n:9,t:"Outro: Love Is Not Over (Full Length Edition)",d:"4:01",mbti:"INFP",themes:["grief","love's persistence","unresolved endings"],meaning:"Love doesn't end cleanly — it lingers, changes shape, refuses to resolve. One of the most quietly devastating BTS outros.",universe:"The emotional endpoint of HYYH Pt.1's love arc. Its irresolution sets up the chaos of Pt.2 — love that won't end is the condition that makes 'Run' and 'Butterfly' possible.",lyric:"Love is not over / Not yet / I can still feel it everywhere",mood:1}
        ]
      },
      {
        id:"hyyh2", type:"EP", title:"THE MOST BEAUTIFUL MOMENT IN LIFE PT.2", date:"Nov 30, 2015",
        tagline:"Youth turning dark — the HYYH arc deepens, shadows lengthen, and the boys begin to fracture.",
        color:{bg:"#0f0f1a",accent:"#a78bfa",text:"#ddd6fe"},
        tracks:[
          {n:1,t:"Intro: Never Mind",d:"2:44",mbti:"INTJ",themes:["scars as strength","Suga's autobiography","acceleration"],meaning:"Suga's raw manifesto: if you crash, accelerate through it. Born from his own years of hardship and near-quitting.",universe:"The emotional DNA of Suga's entire Agust D trilogy. 'Never Mind' is the origin point — compare to 'Amygdala' on D-DAY, where the same survival instinct is examined with clinical precision.",lyric:"If you feel you might fall / Just accelerate harder / Never mind the scars",mood:5},
          {n:2,t:"Run",d:"3:55",mbti:"ENFP",themes:["reckless love","the HYYH universe","choice"],meaning:"A choice to run blindly into love even knowing it might destroy you. One of BTS's most cinematic moments — the MV deepens the HYYH narrative significantly.",universe:"One of the HYYH universe's key nodes. The short film expands the seven boys' story. Thematically mirrors 'Butterfly' — both are about choosing something fragile.",lyric:"Run run run / Even if I fall / I'll keep running toward you",mood:5},
          {n:3,t:"Butterfly",d:"4:41",mbti:"INFP",themes:["fragile belonging","impermanence","dreamlike states"],meaning:"Fearing that happiness will dissolve like a butterfly you've tried to hold. One of the most emotionally complex songs in the HYYH saga.",universe:"One of the HYYH short films is titled 'Butterfly' — it visualises the fear of something precious disappearing. The track's dreamlike production mirrors the unreality of the narrative.",lyric:"Am I dreaming / Don't disappear / You're like a butterfly",mood:1},
          {n:4,t:"Whalien 52",d:"3:56",mbti:"INFP",themes:["loneliness","uniqueness","isolation"],meaning:"The 52-Hz whale's isolation as a metaphor for feeling profoundly unheard. A full version of the Dark & Wild interlude, here given room to breathe.",universe:"Expands the Dark & Wild interlude into a complete statement. The loneliness theme runs directly into Wings' 'Reflection' and BE's 'Blue & Grey'.",lyric:"Nobody can hear me / My frequency is wrong / 52 Hz of silence",mood:1},
          {n:5,t:"Ma City",d:"3:36",mbti:"ESFJ",themes:["hometown","Korean identity","belonging"],meaning:"Each member representing their hometown — Gwangju, Ilsan, Daegu, Geochang, Busan, Seoul — a joyful geography lesson wrapped in a banger.",universe:"Roots BTS's identity in specific Korean places. Part of a running thread of cultural grounding — Paldogangsan, 'Ma City', 'Idol' (pansori), and the title ARIRANG.",lyric:"My city, my people / This is where I'm from / This is who I am",mood:4},
          {n:6,t:"Silver Spoon (뱁새)",d:"3:36",mbti:"ENTP",themes:["class critique","generational inequality","Korean society"],meaning:"Korea's 'spoon theory' — gold, silver, and dirt spoons determining life outcomes by birth. Arguably BTS's most politically sharp moment to this point.",universe:"The social critique arc: 'No More Dream' → 'N.O' → 'Silver Spoon' → 'Go Go' → 'UGH!' — each track sharpening the lens on a society that stacks the deck.",lyric:"They say try hard / But the game was rigged / My spoon isn't silver",mood:4},
          {n:7,t:"Skit: One Night in a Strange City",d:"3:08",mbti:"ESFJ",themes:["wonder","global arrival","unscripted"],meaning:"The members reflecting on performing in a foreign city for the first time — disorientation and awe captured unscripted.",universe:"Documents the moment global success became real. A companion to the 'Skit: Billboard Music Awards Speech' on Love Yourself: Her — two snapshots of the same journey.",lyric:"[Unscripted] Can you believe where we are right now?",mood:3},
          {n:8,t:"Beautiful",d:"3:41",mbti:"ISFP",themes:["transience","present-moment beauty","vocal line"],meaning:"An ode to youth's beauty precisely because it's temporary — one of BTS's most musically rich vocal tracks.",universe:"The thematic heart of HYYH — 花樣年華 (the most beautiful moment in life) is beautiful because it ends. Echoes forward into 'Epilogue: Young Forever' and 'Yet to Come'.",lyric:"This moment is beautiful / Because it will not last / Hold it gently",mood:2},
          {n:9,t:"Outro: House of Cards",d:"4:24",mbti:"INTJ",themes:["inevitable collapse","doomed love","foreshadowing"],meaning:"A love built like a house of cards — intricate, beautiful, and doomed. Foreshadows the darkness that deepens in Young Forever.",universe:"Structurally foreshadows the Love Yourself era's central theme: the illusion of love that can't withstand scrutiny. 'Fake Love' is this song's conclusion.",lyric:"This house of cards we built / So carefully / Will it last the night",mood:1}
        ]

      {
        id:"youngforever", type:"Compilation", title:"THE MOST BEAUTIFUL MOMENT IN LIFE: YOUNG FOREVER", date:"May 2, 2016",
        tagline:"The HYYH anthology — new tracks bookend the era's conclusion, asking if youth was all a dream.",
        color:{bg:"#0f1a0a",accent:"#86efac",text:"#bbf7d0"},
        tracks:[
          {n:1,t:"Epilogue: Young Forever",d:"4:51",mbti:"INFP",themes:["acceptance","youth's end","memory"],meaning:"Accepting that youth ends — but it was real, it was beautiful, and it will always have existed. BTS's most philosophically mature moment to this point.",universe:"The emotional resolution of the HYYH era. Its acceptance of transience is revisited a decade later in 'Yet to Come' — the best moment was then, and something better is still ahead.",lyric:"Forever we are young / Even when the world ends / This moment was real",mood:2},
          {n:2,t:"Fire (불타오르네)",d:"3:23",mbti:"ENFP",themes:["catharsis","burning youth","release"],meaning:"After all the HYYH introspection, a pure adrenaline release — burning youth before it disappears. A deliberate tonal explosion.",universe:"The emotional pressure valve after two heavy EPs. Same role as 'Dynamite' after the weight of Map of the Soul: 7 — joy deployed as intentional release.",lyric:"Burn it up / FIRE / We're young so what / Let's burn it all",mood:5},
          {n:3,t:"Save Me",d:"3:49",mbti:"ENFJ",themes:["rescue","ARMY","dual meaning"],meaning:"A fragile, urgent plea that works simultaneously as a love song and as a message to fans who found solace in BTS. The dual reading became intentional.",universe:"One of the first tracks where BTS explicitly acknowledges the mutual rescue between themselves and ARMY — a dynamic that fully crystallises in 'Magic Shop' and 'Answer: Love Myself'.",lyric:"Save me / I can't breathe without you / Only you can bring me back",mood:3}
        ]

  {

    albums:[
      {
        id:"wings", type:"Studio Album", title:"WINGS", date:"Oct 10, 2016",
        tagline:"Temptation, growth, and the fall — BTS's most conceptually ambitious album, inspired by Hermann Hesse's Demian.",
        color:{bg:"#1a0f0a",accent:"#fb923c",text:"#fed7aa"},
        tracks:[
          {n:1,t:"Intro: Boy Meets Evil",d:"3:24",mbti:"INTJ",themes:["temptation","j-hope's solo artistry","Demian"],meaning:"j-hope's dance-led intro — temptation as a beautiful stranger who promises everything. His best pre-solo performance, mixing vulnerability with stunning physicality.",universe:"Opens Wings' Demian framework: the boy (Sinclair) meets evil (Demian). The intro is the door — everything that follows is what happens after you walk through it.",lyric:"The boy met evil / And it was beautiful / He should have run",mood:4},
          {n:2,t:"Blood Sweat & Tears (피 땀 눈물)",d:"3:38",mbti:"ENFJ",themes:["willing corruption","Baroque imagery","Nietzsche","Demian"],meaning:"BTS choosing temptation with open eyes. The most seductive sound in their catalogue, drenched in Baroque imagery. References Demian, Bruegel's 'Fall of the Rebel Angels', and Nietzsche.",universe:"The MV is a dense visual essay — each shot references a specific artwork or philosophical text. Wings is BTS's most explicitly intertextual album, and this is its centrepiece.",lyric:"Cover my eyes / Cover my ears / But I want this sin",mood:5},
          {n:3,t:"Begin",d:"3:36",mbti:"ISFP",themes:["Jungkook's origin","hyungs","formation"],meaning:"Jungkook's solo — coming to Seoul at 15, shaped entirely by his hyungs. Before them, he didn't know who he was.",universe:"Begins the Wings solo sequence. Each member gets one track that functions as their most honest self-portrait to that point — together they form a composite portrait of seven different kinds of pain and love.",lyric:"Without you / I don't know who I'd be / You completed me",mood:2},
          {n:4,t:"Lie",d:"3:55",mbti:"INFP",themes:["Jimin's internal conflict","identity fracture","distortion"],meaning:"Jimin's solo — a haunting confession of fighting against himself. The distorted production mirrors fractured identity.",universe:"Jimin's ongoing exploration of self-division — continues through 'Filter' (Map of the Soul: 7), 'Serendipity', and reaches its fullest statement in his solo album FACE.",lyric:"I'm lying to myself / Caught in a lie / I can't escape",mood:3},
          {n:5,t:"Stigma",d:"3:52",mbti:"INFP",themes:["V's guilt","family","hidden pain"],meaning:"V's solo — a deeply personal confession about hiding pain from family. The stigma of artistic sensitivity in a world that doesn't value it.",universe:"V's emotional self-disclosure here foreshadows '2.0' and 'Inner Child' on Map of the Soul: 7 — the process of letting family and the public see the real version.",lyric:"I have sinned against you / Forgive me / This stigma won't wash off",mood:2},
          {n:6,t:"First Love (첫사랑)",d:"4:56",mbti:"ISFP",themes:["Suga & the piano","autobiography","devotion to art"],meaning:"Suga's literal autobiography about his relationship with the piano — from childhood obsession to near-abandonment to reunion. One of the most honest tracks in BTS's entire catalogue.",universe:"The origin story for the Agust D persona. The piano here is the thing that saved him; by D-DAY, he's examining what being saved by art actually costs.",lyric:"My first love was not a person / It was a piano / It saved me",mood:2},
          {n:7,t:"Reflection",d:"4:21",mbti:"INTJ",themes:["self-hatred","RM's introspection","Ttukseom Park"],meaning:"RM's solo — a walk through Ttukseom Park asking why he can't love himself. The most vulnerable he'd been to this point, and the direct foundation for the Love Yourself arc.",universe:"The seed of the entire Love Yourself trilogy. RM can't answer the question here; the series that follows is BTS's attempt to find an answer — which arrives in 'Answer: Love Myself'.",lyric:"I wish I could love myself / But when I look in the mirror / I don't know what I see",mood:1},
          {n:8,t:"MAMA",d:"4:00",mbti:"ENFP",themes:["j-hope's mother","gratitude","gospel"],meaning:"j-hope's tribute to his mother. Built around a simple gospel chord. The most emotionally direct track on Wings.",universe:"j-hope's most personal pre-solo work. 'MAMA' is the emotional foundation for his solo discography — the gratitude that anchors everything else he makes.",lyric:"Mama / Thank you / Everything I have is because of you",mood:3},
          {n:9,t:"Awake",d:"4:09",mbti:"INFP",themes:["Jin's acceptance","limitation","quiet courage"],meaning:"Jin's solo — knowing he may never be as talented as his members, but choosing to keep running anyway. 'Six flowers, and I' is one of BTS's most resonant images.",universe:"Jin's quiet self-awareness here stands apart from every other Wings solo — not crisis or confession, but acceptance. Revisited in 'Epiphany' (Love Yourself: Answer) and 'Yet to Come'.",lyric:"Maybe I can never fly / Maybe I can never touch the sky / But I'll still reach for it",mood:2},
          {n:10,t:"Lost",d:"4:02",mbti:"ENFJ",themes:["collective uncertainty","comfort","group track"],meaning:"A full group track about being lost together — the comfort of collective confusion. Musically gentle, emotionally communal.",universe:"The group voice amid the solo explorations — a reminder that even as each member finds their own fractures, they're still navigating together.",lyric:"We're all lost / But we're lost together / That's enough",mood:2},
          {n:11,t:"BTS Cypher 4",d:"4:08",mbti:"ISTP",themes:["rap line","mastery","vindication"],meaning:"The final official Cypher — the most polished and confident. RM's verse is a masterclass in controlled aggression. The rap line has arrived.",universe:"Closes the Cypher series that began in O!RUL8,2?. Pt.1 was hunger; Pt.4 is mastery. Together they document the rap line's full arc.",lyric:"You tried to silence me / But here I am / This is Cypher 4",mood:5},

function countAllTracks() { let n=0; DISCOGRAPHY.forEach(era=>era.albums.forEach(al=>n+=al.tracks.length)); return n; }
function countAllAlbums() { let n=0; DISCOGRAPHY.forEach(era=>n+=era.albums.length); return n; }

function buildNav() {
  document.getElementById('nav-inner').innerHTML = DISCOGRAPHY.map((era,i)=>
    `<div class="nav-era${i===0?' active':''}" onclick="scrollToEra('${era.eraId}',this)">${era.era}</div>`
  ).join('');
}

function coverStyle(c) { return `background:${c.bg};border:1px solid ${c.accent}55;color:${c.text};`; }
function pipDots(mood,accent) { return Array.from({length:5},(_,i)=>`<div class="pip${i<mood?' on':''}" style="color:${accent}"></div>`).join(''); }

function buildAlbum(al) {
  const c = al.color;
  const mbtiSet = [...new Set(al.tracks.map(t=>t.mbti))].sort();
  const pillsHtml = `<span class="filter-label">MBTI</span><button class="mbti-pill active" onclick="filterMbti('${al.id}','all',this)">All</button>`
    + mbtiSet.map(m=>`<button class="mbti-pill" onclick="filterMbti('${al.id}','${m}',this)">${m}</button>`).join('');

  const tracksHtml = al.tracks.map(t => {
    const themeChips = (t.themes||[]).map(th=>
      `<span class="theme-chip" style="background:${c.bg};color:${c.text};border-color:${c.accent}40">${th}</span>`
    ).join('');
    return `
    <div class="track-row" data-mbti="${t.mbti}" data-album="${al.id}">
      <div class="track-row-header" onclick="toggleTrack(this)">
        <span class="track-n">${t.n}</span>
        <span class="track-name">${t.t}</span>
        <div class="track-tags">
          <span class="t-tag t-mbti">${t.mbti}</span>
          <span class="t-tag t-theme" style="color:${c.text};border-color:${c.accent}40">${(t.themes||[])[0]||''}</span>
        </div>
        <span class="track-dur">${t.d}</span>
        <span class="track-chev">▾</span>
      </div>
      <div class="track-detail">
        <div class="intensity-bar">
          <span class="intensity-label">Intensity</span>
          <div style="display:flex;gap:4px">${pipDots(t.mood,c.accent)}</div>
        </div>
        <div class="themes-row">${themeChips}</div>
        <div class="detail-grid">
          <div class="detail-section"><h5>Meaning</h5><p>${t.meaning}</p></div>
          <div class="detail-section">
            <div class="universe-block" style="border-color:${c.accent}30">
              <h5>Bangtan Universe</h5>
              <p>${t.universe}</p>
            </div>
          </div>
        </div>
        <div class="lyric-quote" style="background:${c.bg};border-left-color:${c.accent}">${t.lyric}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="album-card" id="album-${al.id}" style="--al-bg:${c.bg}">
    <div class="album-card-header" onclick="toggleAlbum('${al.id}')">
      <div class="album-cover" style="${coverStyle(c)}">${al.title.replace(/:/g,'\n')}</div>
      <div class="album-info">
        <div class="album-type" style="color:${c.accent}">${al.type}</div>
        <div class="album-title">${al.title}</div>
        <div class="album-date">${al.date} &nbsp;·&nbsp; ${al.tracks.length} track${al.tracks.length!==1?'s':''}</div>
        <div class="album-tagline">${al.tagline}</div>
      </div>
      <button class="album-toggle" style="border-color:${c.accent}60;color:${c.accent}" onclick="event.stopPropagation();toggleAlbum('${al.id}')">Show ▾</button>
    </div>
    <div class="tracklist" id="tl-${al.id}">
      <div class="filter-bar">${pillsHtml}</div>
      <div class="track-list">${tracksHtml}</div>
    </div>
  </div>`;
}

function buildPage() {
  document.getElementById('stat-albums').textContent = countAllAlbums();
  document.getElementById('stat-tracks').textContent = countAllTracks();
  document.getElementById('main-content').innerHTML = DISCOGRAPHY.map((era,idx)=>`
    <div class="era-block" id="era-${era.eraId}" style="--era-accent:${era.accent}">
      <div class="era-header">
        <span class="era-num">0${idx+1}</span>
        <h2 class="era-name">${era.era}</h2>
        <span class="era-years">${era.years}</span>
      </div>
      <div class="album-grid">${era.albums.map(buildAlbum).join('')}</div>
    </div>`).join('');
}

function toggleAlbum(id) {
  const tl = document.getElementById('tl-'+id);
  const btn = document.querySelector(`#album-${id} .album-toggle`);
  const open = tl.classList.toggle('open');
  if (btn) btn.textContent = open ? 'Hide ▴' : 'Show ▾';
}
function toggleTrack(header) {
  header.nextElementSibling.classList.toggle('open');
  header.querySelector('.track-chev').classList.toggle('open');
}
function filterMbti(albumId,mbti,btn) {
  document.getElementById('tl-'+albumId).querySelectorAll('.mbti-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tl-'+albumId).querySelectorAll('.track-row').forEach(r=>{
    r.classList.toggle('hidden', mbti!=='all' && r.dataset.mbti!==mbti);
  });
}
function scrollToEra(id,el) {
  document.querySelectorAll('.nav-era').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  const t = document.getElementById('era-'+id);
  if (t) t.scrollIntoView({behavior:'smooth',block:'start'});
}
function setupScrollSpy() {
  const eras = DISCOGRAPHY.map(e=>({id:e.eraId,el:document.getElementById('era-'+e.eraId)}));
  const navItems = document.querySelectorAll('.nav-era');
  window.addEventListener('scroll',()=>{
    let cur = eras[0].id;
    eras.forEach(e=>{if(e.el&&window.scrollY>=e.el.offsetTop-120)cur=e.id;});
    navItems.forEach((n,i)=>n.classList.toggle('active',DISCOGRAPHY[i]?.eraId===cur));
  });
}
buildNav(); buildPage(); setupScrollSpy();
</script>
