<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS — Complete Discography</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+KR:wght@300;400;600&family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --fg: #f2ede8;
    --muted: #666;
    --border: rgba(255,255,255,0.07);
    --card: #0e0e0e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    padding: 2rem;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120% 70% at 20% 80%, #1a0a2e 0%, transparent 55%),
      radial-gradient(ellipse 80% 60% at 80% 20%, #0a1a2e 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 50% 50%, #130a1f 0%, #080808 70%);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.2s cubic-bezier(.22,1,.36,1) forwards;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(100px, 20vw, 220px);
    letter-spacing: 0.06em;
    line-height: 0.85;
    color: #fff;
    opacity: 0;
    animation: fadeUp 0.9s 0.35s cubic-bezier(.22,1,.36,1) forwards;
    position: relative;
  }
  .hero-title .accent {
    background: linear-gradient(135deg, #7c3aed 0%, #ec4899 50%, #f97316 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-meta {
    margin-top: 2rem;
    display: flex;
    justify-content: center;
    gap: 3rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.5s cubic-bezier(.22,1,.36,1) forwards;
  }
  .hero-meta-item { text-align: center; }
  .hero-meta-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.04em;
    color: #fff;
    line-height: 1;
  }
  .hero-meta-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }
  .hero-scroll {
    position: absolute; bottom: 2.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeUp 0.9s 0.9s forwards;
  }
  .scroll-track { width: 1px; height: 50px; background: var(--border); position: relative; overflow: hidden; }
  .scroll-thumb {
    position: absolute; top: -100%; width: 100%; height: 50%;
    background: linear-gradient(to bottom, transparent, var(--muted));
    animation: scrollDrop 2.2s ease-in-out infinite;
  }
  .scroll-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted);
  }
  @keyframes scrollDrop { 0%{top:-100%} 100%{top:200%} }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(16px) saturate(1.5);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    display: flex; gap: 0;
    max-width: 1400px; margin: 0 auto; padding: 0 2rem;
    overflow-x: auto; white-space: nowrap;
    scrollbar-width: none;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-era {
    padding: 15px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: all 0.2s; flex-shrink: 0;
  }
  .nav-era:hover { color: rgba(255,255,255,0.6); }
  .nav-era.active { color: var(--fg); border-bottom-color: var(--fg); }

  /* ── MAIN ── */
  main { max-width: 1400px; margin: 0 auto; padding: 5rem 2rem 10rem; }

  /* ── ERA HEADER ── */
  .era-block { margin-bottom: 7rem; }
  .era-header {
    display: flex; align-items: baseline; gap: 1.2rem;
    margin-bottom: 3rem; padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .era-header::before {
    content: '';
    position: absolute; bottom: -1px; left: 0;
    width: 60px; height: 1px;
    background: var(--era-accent, #7c3aed);
  }
  .era-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; color: var(--muted);
    margin-right: 0.3rem;
  }
  .era-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(30px, 4.5vw, 48px);
    letter-spacing: 0.04em; color: var(--fg);
  }
  .era-years {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em; color: var(--muted);
    margin-left: auto;
  }

  /* ── ALBUM GRID ── */
  .album-grid { display: grid; gap: 1.5rem; }

  /* ── ALBUM CARD ── */
  .album-card {
    border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
    background: var(--card);
    transition: border-color 0.3s;
  }
  .album-card:hover { border-color: rgba(255,255,255,0.12); }

  .album-card-header {
    padding: 1.75rem 2rem;
    display: flex; align-items: flex-start; gap: 1.5rem;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .album-card-header::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 100% at 0% 50%, var(--al-bg, transparent) 0%, transparent 70%);
    pointer-events: none; opacity: 0.4;
  }

  .album-cover {
    width: 72px; height: 72px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 9px;
    letter-spacing: 0.1em; text-align: center; line-height: 1.4;
    padding: 6px;
  }
  .album-info { flex: 1; min-width: 0; }
  .album-type {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 5px;
  }
  .album-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 2.5vw, 26px);
    letter-spacing: 0.05em; line-height: 1.1; margin-bottom: 5px;
  }
  .album-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); margin-bottom: 8px;
  }
  .album-tagline {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px; color: rgba(242,237,232,0.5);
    line-height: 1.6; font-style: italic; font-weight: 300;
  }
  .album-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 7px 14px; border-radius: 999px;
    border: 1px solid; background: transparent;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    align-self: flex-start; margin-top: 2px; flex-shrink: 0;
  }
  .album-toggle:hover { background: rgba(255,255,255,0.05); }

  /* ── TRACKLIST ── */
  .tracklist { display: none; border-top: 1px solid var(--border); }
  .tracklist.open { display: block; }

  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
    padding: 1rem 2rem; border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
  }
  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-right: 6px;
  }
  .mbti-pill {
    font-family: 'DM Mono', monospace;
    font-size: 9px; padding: 3px 10px; border-radius: 999px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .mbti-pill:hover { border-color: rgba(255,255,255,0.2); color: var(--fg); }
  .mbti-pill.active { background: rgba(255,255,255,0.08); color: var(--fg); border-color: rgba(255,255,255,0.25); }

  /* ── TRACKS ── */
  .track-list { padding: 0; }
  .track-row { border-bottom: 1px solid var(--border); }
  .track-row:last-child { border-bottom: none; }
  .track-row.hidden { display: none; }

  .track-row-header {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 2rem; cursor: pointer;
    transition: background 0.15s;
  }
  .track-row-header:hover { background: rgba(255,255,255,0.025); }

  .track-n {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); min-width: 18px; text-align: right;
  }
  .track-name { flex: 1; font-size: 13px; font-weight: 700; letter-spacing: 0.01em; }
  .track-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .t-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px; padding: 2px 8px; border-radius: 4px;
    font-weight: 400; letter-spacing: 0.04em; white-space: nowrap;
  }
  .t-mbti { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.25); }
  .t-theme { border: 1px solid var(--border); color: var(--muted); background: transparent; }
  .track-dur {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); white-space: nowrap;
  }
  .track-chev { font-size: 10px; color: var(--muted); transition: transform 0.25s; flex-shrink: 0; }
  .track-chev.open { transform: rotate(180deg); }

  /* ── TRACK DETAIL ── */
  .track-detail { display: none; padding: 0 2rem 1.5rem 3.2rem; }
  .track-detail.open { display: block; }

  .intensity-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 1rem;
  }
  .intensity-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
  }
  .pip { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .pip.on { background: currentColor; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1rem; }
  .detail-section h5 {
    font-family: 'DM Mono', monospace;
    font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .detail-section p { font-size: 12px; color: rgba(242,237,232,0.65); line-height: 1.7; }
  .lyric-quote {
    padding: 12px 16px; border-radius: 6px;
    font-family: 'Noto Serif KR', serif;
    font-size: 12px; font-weight: 300; font-style: italic;
    line-height: 1.8; color: rgba(242,237,232,0.7);
    border-left: 2px solid;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 3rem 2rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em; color: var(--muted);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .detail-grid { grid-template-columns: 1fr; }
    .album-card-header { flex-wrap: wrap; }
    .track-tags { display: none; }
    .hero-meta { gap: 1.5rem; }
  }
</style>
</head>

          { n:7, t:"SWIM", d:"2:39", mbti:"INFP", theme:"Moving at your own pace", meaning:"The title track — an alternative pop song about facing life's waves without stopping. RM co-wrote the lyrics: move at your own pace, don't resist the current. 'Love for life' is the message. Debuted #1 on the Hot 100.", character:"Quietly determined, finding wisdom in the idea that endurance doesn't require force.", lyric:"I'll keep swimming / Through the waves / At my own pace, love", mood:3 },
          { n:8, t:"Merry Go Round", d:"3:50", mbti:"INTJ", theme:"Life's repetitive cycles", meaning:"A rock-inspired track about the hamster-wheel numbness of enduring endless cycles — fame, expectation, the relentless forward motion that never quite arrives anywhere new.", character:"Perceptive and unflinching, examining the machinery of their own lives without romanticising it.", lyric:"Round and round / The merry go round / When does it stop?", mood:3 },
          { n:9, t:"NORMAL", d:"3:02", mbti:"INFP", theme:"On and off stage", meaning:"Captures the emotions felt both on stage and in private — the question of what 'normal' even means when your life has never resembled it. Suga and j-hope both contributed.", character:"Introspective and honest, refusing the performance of wellness.", lyric:"On stage I know who I am / Off stage / I'm still figuring it out", mood:2 },
          { n:10, t:"Like Animals", d:"3:10", mbti:"ENFJ", theme:"Fierce will to live", meaning:"A grungy, full-band track expressing a primal will to live passionately — visceral and raw, the most physically intense moment on the album.", character:"Passionately alive, connecting identity to the animal force of simply continuing.", lyric:"Like animals / We fight to live / Fierce and free and loud", mood:5 },
          { n:11, t:"they don't know 'bout us", d:"2:44", mbti:"ESFJ", theme:"Self-assurance & ARMY bond", meaning:"A confident message about the bond between BTS and ARMY that outsiders simply cannot understand. j-hope and V: 'They're special among Asians / Heroic figures, too hard to break / Just seven people, though.'", character:"Communal and proud, finding power in a shared history that can't be explained from outside.", lyric:"They don't know 'bout us / What we built / What we mean to each other", mood:4 },
          { n:12, t:"One More Night", d:"2:48", mbti:"ENFP", theme:"Holding onto euphoria", meaning:"The desire to hold onto one perfect moment a little longer — not quite ready for the concert to end, not quite ready to let the feeling go. Diplo's production and Pdogg's melodic instinct meet in the middle.", character:"Spontaneous and feeling-driven, knowing the moment will pass and choosing to stay in it anyway.", lyric:"One more night / Just one more / Don't let this feeling end", mood:3 },
          { n:13, t:"Please", d:"2:53", mbti:"ESFJ", theme:"Staying together", meaning:"Written solely by the rap line — a sincere wish to stay together regardless of what comes next. Jin's vocals alongside RM's lower register. The album's most intimate and direct emotional statement.", character:"Warmly communal, expressing love through the simple act of asking someone not to leave.", lyric:"Please / Stay / That's all I'm asking", mood:2 },
          { n:14, t:"Into the Sun", d:"3:48", mbti:"ENFP", theme:"Running toward the future", meaning:"The album closer — layered vocoder harmonies blur individual voices into one arena-ready chorus. A heartfelt confession about running toward someone, toward the future, toward ARMY. The album's thesis made sonic: together, forward, into the light.", character:"Generously open, finding the fullest expression of self in the act of moving toward rather than away.", lyric:"I'll follow you into the sun / All seven of us / Into the light", mood:4 }
        ]
      }
    ]
  }
];

function countAllTracks() {
  let n = 0;
  DISCOGRAPHY.forEach(era => era.albums.forEach(al => n += al.tracks.length));
  return n;
}

function countAllAlbums() {
  let n = 0;
  DISCOGRAPHY.forEach(era => n += era.albums.length);
  return n;
}

function buildNav() {
  const nav = document.getElementById('nav-inner');
  nav.innerHTML = DISCOGRAPHY.map((era, i) =>
    `<div class="nav-era${i===0?' active':''}" onclick="scrollToEra('${era.eraId}',this)">${era.era}</div>`
  ).join('');
}

function coverStyle(c) {
  return `background: ${c.bg}; border: 1px solid ${c.accent}55; color: ${c.text};`;
}

function pipDots(mood, accent) {
  return Array.from({length:5}, (_,i) =>
    `<div class="pip${i < mood ? ' on' : ''}" style="color:${accent}"></div>`
  ).join('');
}

function buildAlbum(al) {
  const c = al.color;
  const mbtiSet = [...new Set(al.tracks.map(t => t.mbti))].sort();
  const pillsHtml = `<span class="filter-label">MBTI</span><button class="mbti-pill active" onclick="filterMbti('${al.id}','all',this)">All</button>` +
    mbtiSet.map(m => `<button class="mbti-pill" onclick="filterMbti('${al.id}','${m}',this)">${m}</button>`).join('');

  const tracksHtml = al.tracks.map(t => `
    <div class="track-row" data-mbti="${t.mbti}" data-album="${al.id}">
      <div class="track-row-header" onclick="toggleTrack(this)">
        <span class="track-n">${t.n}</span>
        <span class="track-name">${t.t}</span>
        <div class="track-tags">
          <span class="t-tag t-mbti">${t.mbti}</span>
          <span class="t-tag t-theme" style="color:${c.text};border-color:${c.accent}40">${t.theme}</span>
        </div>
        <span class="track-dur">${t.d}</span>
        <span class="track-chev">▾</span>
      </div>
      <div class="track-detail">
        <div class="intensity-bar">
          <span class="intensity-label">Intensity</span>
          <div style="display:flex;gap:4px">${pipDots(t.mood, c.accent)}</div>
        </div>
        <div class="detail-grid">
          <div class="detail-section"><h5>Meaning</h5><p>${t.meaning}</p></div>
          <div class="detail-section"><h5>MBTI Lens</h5><p>${t.character}</p></div>
        </div>
        <div class="lyric-quote" style="background:${c.bg};border-left-color:${c.accent}">${t.lyric}</div>
      </div>
    </div>`).join('');

  return `<div class="album-card" id="album-${al.id}" style="--al-bg:${c.bg}">
    <div class="album-card-header" onclick="toggleAlbum('${al.id}')">
      <div class="album-cover" style="${coverStyle(c)}">${al.title.replace(/:/g,'\n')}</div>
      <div class="album-info">
        <div class="album-type" style="color:${c.accent}">${al.type}</div>
        <div class="album-title">${al.title}</div>
        <div class="album-date">${al.date} &nbsp;·&nbsp; ${al.tracks.length} track${al.tracks.length!==1?'s':''}</div>
        <div class="album-tagline">${al.tagline}</div>
      </div>
      <button class="album-toggle" style="border-color:${c.accent}60;color:${c.accent}" onclick="event.stopPropagation();toggleAlbum('${al.id}')">Show ▾</button>
    </div>
    <div class="tracklist" id="tl-${al.id}">
      <div class="filter-bar">${pillsHtml}</div>
      <div class="track-list">${tracksHtml}</div>
    </div>
  </div>`;
}

function buildPage() {
  document.getElementById('stat-albums').textContent = countAllAlbums();
  document.getElementById('stat-tracks').textContent = countAllTracks();

  const main = document.getElementById('main-content');
  main.innerHTML = DISCOGRAPHY.map((era, idx) => `
    <div class="era-block" id="era-${era.eraId}" style="--era-accent:${era.accent}">
      <div class="era-header">
        <span class="era-num">0${idx+1}</span>
        <h2 class="era-name">${era.era}</h2>
        <span class="era-years">${era.years}</span>
      </div>
      <div class="album-grid">${era.albums.map(buildAlbum).join('')}</div>
    </div>
  `).join('');
}

function toggleAlbum(id) {
  const tl = document.getElementById('tl-' + id);
  const btn = document.querySelector(`#album-${id} .album-toggle`);
  const isOpen = tl.classList.toggle('open');
  if (btn) btn.textContent = isOpen ? 'Hide ▴' : 'Show ▾';
}

function toggleTrack(header) {
  const detail = header.nextElementSibling;
  const chev = header.querySelector('.track-chev');
  detail.classList.toggle('open');
  chev.classList.toggle('open');
}

function filterMbti(albumId, mbti, btn) {
  const tl = document.getElementById('tl-' + albumId);
  tl.querySelectorAll('.mbti-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  tl.querySelectorAll('.track-row').forEach(row => {
    row.classList.toggle('hidden', mbti !== 'all' && row.dataset.mbti !== mbti);
  });
}

function scrollToEra(id, el) {
  document.querySelectorAll('.nav-era').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  const target = document.getElementById('era-' + id);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setupScrollSpy() {
  const eras = DISCOGRAPHY.map(e => ({ id: e.eraId, el: document.getElementById('era-' + e.eraId) }));
  const navItems = document.querySelectorAll('.nav-era');
  window.addEventListener('scroll', () => {
    let current = eras[0].id;
    eras.forEach(e => { if (e.el && window.scrollY >= e.el.offsetTop - 120) current = e.id; });
    navItems.forEach((n, i) => n.classList.toggle('active', DISCOGRAPHY[i]?.eraId === current));
  });
}

buildNav();
buildPage();
setupScrollSpy();
</script>
</body>
</html>
